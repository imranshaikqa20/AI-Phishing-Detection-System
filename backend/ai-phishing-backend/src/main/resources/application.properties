# =========================================
# APPLICATION NAME
# =========================================

spring.application.name=AI-Phishing-Detection-Backend

# =========================================
# SERVER CONFIGURATION
# =========================================

server.port=8080

# =========================================
# POSTGRESQL DATABASE CONFIGURATION
# =========================================

spring.datasource.url=jdbc:postgresql://localhost:5432/phishing_db

spring.datasource.username=postgres

spring.datasource.password=shaikimran123!@#

spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================
# JPA / HIBERNATE CONFIGURATION
# =========================================

# OPTIONS:
# create  -> recreate tables every restart
# update  -> keep existing data

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =========================================
# JWT CONFIGURATION
# =========================================

# IMPORTANT:
# SECRET KEY SHOULD BE LONG
# MINIMUM 32+ CHARACTERS

jwt.secret=MySecureJWTSecretKeyForAIPhishingDetection2026System

# TOKEN EXPIRATION
# 24 HOURS = 86400000 ms

jwt.expiration=86400000

# =========================================
# FRONTEND URL
# =========================================

frontend.url=http://localhost:3000

# =========================================
# CORS CONFIGURATION
# =========================================

spring.web.cors.allowed-origins=http://localhost:3000

spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

spring.web.cors.allowed-headers=*

spring.web.cors.allow-credentials=true

# =========================================
# SPRING SECURITY DEBUG LOGS
# =========================================

logging.level.org.springframework.security=DEBUG

logging.level.org.springframework.security.web.FilterChainProxy=DEBUG

# =========================================
# HIBERNATE SQL LOGS
# =========================================

logging.level.org.hibernate.SQL=DEBUG

logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =========================================
# JWT DEBUG LOGS
# =========================================

logging.level.io.jsonwebtoken=DEBUG

# =========================================
# SERVER ERROR DETAILS
# =========================================

server.error.include-message=always

server.error.include-binding-errors=always

server.error.include-stacktrace=never

# =========================================
# PERFORMANCE OPTIMIZATION
# =========================================

spring.jpa.open-in-view=false

# =========================================
# OPTIONAL JACKSON CONFIG
# =========================================

spring.jackson.serialization.fail-on-empty-beans=false

# =========================================
# OPTIONAL FILE UPLOAD LIMITS
# =========================================

spring.servlet.multipart.max-file-size=10MB

spring.servlet.multipart.max-request-size=10MB

# =========================================
# OPTIONAL ACTUATOR
# =========================================

management.endpoints.web.exposure.include=*

management.endpoint.health.show-details=always